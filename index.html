<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Agent Tester</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        h1 {
            margin-bottom: 20px;
            color: #00d9ff;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background: #16213e;
            color: #eee;
        }
        
        input[type="text"]:focus {
            outline: 2px solid #00d9ff;
        }
        
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            background: #00d9ff;
            color: #1a1a2e;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #00b8d4;
            transform: translateY(-2px);
        }
        
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        
        .response-container {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
            margin-bottom: 20px;
        }
        
        .response-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        #response {
            white-space: pre-wrap;
            line-height: 1.6;
        }
        
        .streaming-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00d9ff;
            border-radius: 50%;
            margin-left: 10px;
            animation: pulse 1s infinite;
            display: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .status {
            font-size: 14px;
            color: #888;
            margin-top: 10px;
        }
        
        .error {
            color: #ff6b6b;
        }
        
        .success {
            color: #51cf66;
        }
    </style>
</head>
<body>
    <h1>🤖 RAG Agent Tester</h1>
    
    <div class="container">
        <div class="input-group">
            <input type="text" id="query" placeholder="Tapez votre question... (ex: prix pipe 25mm)" />
            <button id="sendBtn">Envoyer</button>
        </div>
        
        <div class="response-container">
            <div class="response-label">Réponse <span class="streaming-indicator" id="indicator"></span></div>
            <div id="response"></div>
        </div>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        const queryInput = document.getElementById('query');
        const sendBtn = document.getElementById('sendBtn');
        const responseDiv = document.getElementById('response');
        const statusDiv = document.getElementById('status');
        const indicator = document.getElementById('indicator');

        // Handle Enter key
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        async function sendMessage() {
            const query = queryInput.value.trim();
            if (!query) return;

            // Reset UI
            responseDiv.textContent = '';
            statusDiv.textContent = '';
            statusDiv.className = 'status';
            indicator.style.display = 'inline-block';
            sendBtn.disabled = true;

            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query: query,
                        org_id: 'test_org'
                    }),
                });

                if (!response.ok) {
                    throw new Error(`Erreur HTTP: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                statusDiv.textContent = 'Stream en cours...';
                statusDiv.className = 'status success';

                while (true) {
                    const { done, value } = await reader.read();
                    
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                if (data.type === 'token') {
                                    responseDiv.textContent += data.content;
                                } else if (data.type === 'done') {
                                    statusDiv.textContent = 'Terminé ✓';
                                    indicator.style.display = 'none';
                                } else if (data.type === 'metadata') {
                                    console.log('Metadata:', data);
                                }
                            } catch (e) {
                                // Ignore parse errors for incomplete lines
                            }
                        }
                    }
                }

            } catch (error) {
                statusDiv.textContent = `Erreur: ${error.message}`;
                statusDiv.className = 'status error';
                indicator.style.display = 'none';
            } finally {
                sendBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
